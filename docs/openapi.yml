openapi: 3.1.0
info:
  title: To-Do-List API
  version: 1.0.0

servers:
  - url: /
    description: Local environment

paths:
  /tasks:
    get:
      tags: [Tasks]
      summary: List tasks
      operationId: listTasks
      responses:
        '200':
          description: Task list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCollectionResponse'
              example:
                data:
                  - id: 1
                    title: Buy groceries
                    description: Milk and bread
                    status: pending
                    created_at: '2026-05-09T10:00:00+00:00'
                    updated_at: '2026-05-09T10:00:00+00:00'
    post:
      tags: [Tasks]
      summary: Create task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskStoreRequest'
            example:
              title: Prepare interview
              description: Solve API task
              status: in_progress
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSingleResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /tasks/{id}:
    get:
      tags: [Tasks]
      summary: Show task
      operationId: showTask
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSingleResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
    put:
      tags: [Tasks]
      summary: Update task
      operationId: updateTask
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdateRequest'
            example:
              title: Prepare final interview
              status: completed
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSingleResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
    delete:
      tags: [Tasks]
      summary: Delete task
      operationId: deleteTask
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '204':
          description: Task deleted
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'

components:
  parameters:
    TaskId:
      name: id
      in: path
      required: true
      description: Task identifier
      schema:
        type: integer
        minimum: 1

  schemas:
    Task:
      type: object
      required: [id, title, status, created_at, updated_at]
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          maxLength: 255
          example: Buy groceries
        description:
          type: string
          nullable: true
          example: Milk and bread
        status:
          type: string
          enum: [pending, in_progress, completed]
          example: pending
        created_at:
          type: string
          format: date-time
          example: '2026-05-09T10:00:00+00:00'
        updated_at:
          type: string
          format: date-time
          example: '2026-05-09T10:00:00+00:00'

    TaskStoreRequest:
      type: object
      required: [title, status]
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, in_progress, completed]

    TaskUpdateRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, in_progress, completed]
      additionalProperties: false

    TaskSingleResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Task'

    TaskCollectionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Task'

    ValidationErrorResponse:
      type: object
      required: [message, errors]
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    NotFoundResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: No query results for model [App\Models\Task] 999
