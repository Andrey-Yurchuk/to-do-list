name: to-do-list

services:
  app:
    build:
      context: .
      dockerfile: docker/franken-php/Dockerfile
    volumes:
      - .:/var/www/html
    ports:
      - "${APP_PORT:-8080}:8000"
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
    depends_on:
      mysql:
        condition: service_healthy
    command: php artisan octane:start --server=frankenphp --host=0.0.0.0 --port=8000 --caddyfile=/var/www/html/docker/caddy/Caddyfile

  mysql:
    image: mysql:8.4
    ports:
      - "${FORWARD_DB_PORT:-3309}:3306"
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 40s

volumes:
  mysql_data:
